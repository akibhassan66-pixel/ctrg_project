{% load static %}
<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reupload File</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        }
                    },
                    animation: { 'fade-up': 'fadeUp 0.45s ease both' }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>[style*="animation-delay"] { opacity: 0; }</style>
</head>
<body class="min-h-screen bg-[#CFDAF0] dark:bg-[#0f1729] font-[Inter,sans-serif] transition-colors duration-300">
    <button id="themeToggle" class="fixed right-5 top-5 z-50 flex h-10 w-10 items-center justify-center rounded-full border border-slate-200/70 bg-white/90 text-slate-500 shadow-sm backdrop-blur transition hover:bg-slate-100 dark:border-slate-700/60 dark:bg-slate-900/90 dark:text-slate-300 dark:hover:bg-slate-800">
        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>
        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z"/></svg>
    </button>
    <main class="mx-auto max-w-3xl px-5 py-12">
        <div class="animate-fade-up rounded-[2rem] border border-white/60 bg-white/90 p-8 shadow-xl shadow-slate-900/5 backdrop-blur dark:border-slate-700/60 dark:bg-slate-900/85" style="animation-delay:0ms">
            <p class="text-sm font-semibold uppercase tracking-[0.28em] text-blue-600 dark:text-blue-400">Document Update</p>
            <h1 class="mt-2 text-3xl font-extrabold text-slate-900 dark:text-white">Reupload {{ document_type }} File</h1>
            <p class="mt-3 text-sm text-slate-500 dark:text-slate-400"><b>Proposal:</b> {{ proposal.title }}</p>
            <form method="post" enctype="multipart/form-data" class="mt-8 space-y-4">
                {% csrf_token %}
                <div>
                    <label class="mb-2 block text-sm font-bold text-slate-900 dark:text-slate-100">Select new file</label>
                    <input type="file" name="new_file" accept=".pdf" required class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 dark:border-slate-700 dark:bg-slate-950/70 dark:text-slate-100">
                </div>
                <div class="flex flex-col gap-3 sm:flex-row">
                    <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-5 py-3 text-sm font-bold text-white transition hover:bg-blue-700 dark:bg-blue-600 dark:hover:bg-blue-500">Upload</button>
                    <a href="{% url 'p3_pi_proposal_detail' proposal.proposal_id %}" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 px-5 py-3 text-sm font-bold text-slate-600 transition hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    <script>
        const html = document.documentElement, btn = document.getElementById('themeToggle'), moonIcon = document.getElementById('moonIcon'), sunIcon = document.getElementById('sunIcon');
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) { html.classList.add('dark'); moonIcon.classList.add('hidden'); sunIcon.classList.remove('hidden'); }
        btn.addEventListener('click', () => { const isDark = html.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); moonIcon.classList.toggle('hidden', isDark); sunIcon.classList.toggle('hidden', !isDark); });
        document.querySelectorAll('.animate-fade-up').forEach((el) => { el.style.opacity = ''; });
    </script>
</body>
</html>
