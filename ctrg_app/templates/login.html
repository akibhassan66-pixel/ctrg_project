{% load static %}
<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTRG System Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    },
                    colors: {
                        brand: {
                            blue: '#3B5BDB',
                            green: '#0CA678',
                            amber: '#F59F00',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        [style*="animation-delay"] { opacity: 0; }
    </style>
</head>
<body class="min-h-screen bg-[#CFDAF0] dark:bg-[#0f1729] font-sans transition-colors duration-300 flex flex-col items-center justify-center px-6">

    <!-- Dark mode toggle -->
    <div class="absolute top-5 right-5">
        <button id="themeToggle"
            class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-300 hover:bg-white/40 dark:hover:bg-white/10 transition-colors"
            title="Toggle dark mode">
            <!-- Moon icon -->
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
            </svg>
            <!-- Sun icon (hidden by default) -->
            <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z"/>
            </svg>
        </button>
    </div>

    <!-- Login Container -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-8 w-full max-w-sm shadow-lg dark:shadow-2xl transition-colors duration-300">

        <!-- Brand Section -->
        <div class="text-center mb-6">
            <img src="{% static 'images/ctrg_logo_light_transparent.png' %}" alt="CTRG logo" class="w-32 h-auto mx-auto mb-3">
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white">CTRG Login</h2>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Sign in to access the grant management portal.</p>
        </div>

        <!-- Error Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700 text-red-700 dark:text-red-300 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username Field -->
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-900 dark:text-white mb-2">
                    Username
                </label>
                <input
                    type="text"
                    name="username"
                    id="username"
                    required
                    placeholder="Enter Username"
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
                >
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-900 dark:text-white mb-2">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    required
                    placeholder="Enter Password"
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
                >
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="w-full mt-6 py-2 px-4 bg-blue-600 dark:bg-blue-700 hover:bg-blue-700 dark:hover:bg-blue-600 text-white font-semibold rounded-lg transition-colors duration-200"
            >
                Login
            </button>

            <!-- Signup Link -->
            <p class="mt-4 text-center text-sm text-slate-600 dark:text-slate-400">
                Don't have an account?
                <a href="{% url 'signup' %}" class="font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors">
                    Signup
                </a>
            </p>
        </form>
    </div>

    <script>
        // ── Dark-mode toggle ──────────────────────────────────────────────────
        const html       = document.documentElement;
        const btn        = document.getElementById('themeToggle');
        const moonIcon   = document.getElementById('moonIcon');
        const sunIcon    = document.getElementById('sunIcon');

        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            moonIcon.classList.add('hidden');
            sunIcon.classList.remove('hidden');
        }

        btn.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            moonIcon.classList.toggle('hidden', isDark);
            sunIcon.classList.toggle('hidden', !isDark);
        });
    </script>
</body>
</html>
